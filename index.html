<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <!-- PWA 설정 -->
  <meta name="theme-color" content="#00a86b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WizPay">
  <link rel="manifest" href="manifest.json">
  <!-- iOS 아이콘 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%2300a86b'/><text x='50%25' y='58%25' font-size='95' text-anchor='middle' dominant-baseline='middle' font-family='Arial Black' font-weight='900' fill='white'>W</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WizPay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── 변수 ── */
:root {
  --bg:#f5f5f5; --surface:#fff; --border:#e8e8e8;
  --accent:#00a86b; --text:#111; --muted:#888; --warn:#e03e1a;
  --gold:#b8860b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
body { max-width:430px; margin:0 auto; position:relative; overflow-x:hidden; }

/* ── 화면 전환 ── */
.page { display:none; min-height:100vh; flex-direction:column; }
.page.on { display:flex; }

/* ════════════════════════════
   PAGE 1: 지갑 연결
════════════════════════════ */
#pg-wallet {
  align-items:center; justify-content:center;
  padding:40px 24px; background:var(--bg);
}
.logo { font-family:'Outfit',sans-serif; font-weight:900; font-size:52px;
  letter-spacing:-1px; line-height:1; margin-bottom:8px; }
.logo span { color:var(--accent); }
.tagline { font-size:13px; color:var(--muted); letter-spacing:3px; margin-bottom:16px; }
.wiz-badge {
  display:inline-flex; align-items:center; gap:7px;
  border:1.5px solid var(--border); border-radius:20px;
  padding:6px 16px; margin-bottom:44px;
}
.wiz-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.wiz-name { font-size:13px; font-weight:700; color:var(--accent); }
.wiz-by { font-size:12px; color:var(--muted); }

.wallet-box { width:100%; max-width:340px; }
.err-box { background:#fff0ee; border:2px solid var(--warn); border-radius:12px;
  padding:14px 16px; font-size:14px; color:var(--warn); margin-bottom:16px; display:none; }
.loading-box { text-align:center; padding:14px; font-size:14px; color:var(--muted); margin-bottom:8px; display:none; }

.w-btn {
  width:100%; display:flex; align-items:center; gap:16px;
  background:var(--surface); border:2px solid var(--border);
  border-radius:16px; padding:20px; margin-bottom:12px;
  cursor:pointer; transition:border-color .15s; text-align:left;
}
.w-btn:active { opacity:.75; }
.w-btn.primary { border-color:#f6851b; }
.w-btn-icon { font-size:30px; flex-shrink:0; }
.w-btn-name { font-size:17px; font-weight:700; color:var(--text); }
.w-btn-desc { font-size:13px; color:var(--muted); }
.w-btn-arr { margin-left:auto; font-size:18px; color:var(--muted); }

.guest-btn {
  width:100%; padding:16px; background:transparent;
  border:2px solid var(--border); border-radius:14px;
  color:var(--muted); font-size:15px; font-weight:600; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; margin-top:4px;
}
.net-note { text-align:center; margin-top:20px; font-size:12px; color:var(--muted); line-height:1.8; }

/* ════════════════════════════
   PAGE 2: 매장 목록
════════════════════════════ */
#pg-stores { background:var(--bg); }
.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:52px 20px 16px; background:var(--bg); flex-shrink:0;
}
.top-bar-left {}
.top-title { font-size:26px; font-weight:900; margin-bottom:2px; }
.top-sub { font-size:14px; color:var(--muted); }
.addr-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:20px; padding:7px 14px; font-size:13px;
  font-family:monospace; color:var(--text); font-weight:700; cursor:pointer;
}
.addr-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); }

.store-list { flex:1; overflow-y:auto; padding:8px 16px 80px; }
.store-card {
  background:var(--surface); border:2px solid var(--border);
  border-radius:18px; margin-bottom:12px; overflow:hidden; cursor:pointer;
}
.store-card:active { opacity:.8; }
.sc-body { display:flex; gap:14px; padding:16px; }
.sc-emoji { font-size:40px; width:64px; height:64px; background:var(--bg);
  border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sc-info { flex:1; }
.sc-name { font-size:17px; font-weight:700; margin-bottom:3px; }
.sc-cat { font-size:13px; color:var(--muted); margin-bottom:6px; }
.sc-tags { display:flex; gap:6px; }
.sc-tag { font-size:12px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:3px 8px; color:var(--muted); }
.sc-footer { padding:10px 16px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; }
.sc-reward { font-size:13px; color:var(--muted); }
.sc-reward strong { color:var(--gold); }
.sc-go { font-size:14px; color:var(--accent); font-weight:700; }

/* ════════════════════════════
   PAGE 3: 메뉴 목록
════════════════════════════ */
#pg-menu { background:var(--bg); }
.menu-header { padding:52px 20px 16px; flex-shrink:0; }
.back-btn { display:flex; align-items:center; gap:6px; background:none; border:none;
  color:var(--muted); font-size:15px; cursor:pointer; margin-bottom:14px;
  font-family:'Noto Sans KR',sans-serif; padding:0; }
.store-hero { display:flex; gap:14px; align-items:center; }
.hero-emoji { font-size:36px; width:60px; height:60px; background:var(--surface);
  border:2px solid var(--border); border-radius:14px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hero-name { font-size:24px; font-weight:900; }
.hero-cat { font-size:14px; color:var(--muted); }

.cat-bar { display:flex; gap:8px; padding:10px 16px; overflow-x:auto; flex-shrink:0; }
.cat-bar::-webkit-scrollbar { display:none; }
.cat-btn { padding:8px 16px; border-radius:20px; border:2px solid var(--border);
  background:transparent; color:var(--muted); font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; font-family:'Noto Sans KR',sans-serif; }
.cat-btn.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.menu-list { flex:1; overflow-y:auto; padding:8px 16px 140px; }
.menu-row {
  background:var(--surface); border:2px solid var(--border); border-radius:14px;
  padding:16px; margin-bottom:10px; display:flex; gap:14px; align-items:center;
}
.menu-row.soldout { opacity:.4; }
.menu-emoji { font-size:28px; width:52px; height:52px; background:var(--bg);
  border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.menu-info { flex:1; min-width:0; }
.menu-name { font-size:16px; font-weight:700; margin-bottom:2px; }
.menu-desc { font-size:13px; color:var(--muted); margin-bottom:6px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.menu-price { font-size:18px; font-weight:900; }
.menu-rw { display:inline-block; font-size:12px; color:var(--accent); font-weight:700;
  background:#edfaf3; border:1px solid #b2edcf; border-radius:8px;
  padding:2px 7px; margin-left:6px; }
.soldout-badge { background:var(--warn); color:#fff; font-size:12px; font-weight:700;
  padding:3px 8px; border-radius:8px; flex-shrink:0; }
.qty-wrap { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.qty-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--border);
  background:transparent; font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; color:var(--text); }
.qty-add { width:34px; height:34px; border-radius:50%; border:none;
  background:var(--accent); color:#fff; font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; }
.qty-num { font-size:16px; font-weight:700; min-width:18px; text-align:center; }

/* 장바구니 바 */
.cart-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:var(--surface); border-top:2px solid var(--border); z-index:100;
}
.cart-top { display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; cursor:pointer; }
.cart-cnt { background:var(--accent); color:#fff; width:26px; height:26px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; margin-right:8px; }
.cart-label { font-size:15px; color:var(--muted); font-weight:600; display:flex; align-items:center; }
.cart-total { font-size:20px; font-weight:900; }
.cart-arrow { font-size:14px; color:var(--muted); transition:transform .2s; }
.cart-arrow.up { transform:rotate(180deg); }
.cart-detail { overflow:hidden; max-height:0; transition:max-height .3s ease; }
.cart-detail.open { max-height:55vh; overflow-y:auto; }
.cart-inner { padding:4px 20px 16px; }
.cart-row { display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--border); }
.cart-row-l { display:flex; align-items:center; gap:10px; }
.cart-row-em { font-size:22px; }
.cart-row-name { font-size:15px; font-weight:700; }
.cart-row-price { font-size:13px; color:var(--muted); }
.cart-row-r { display:flex; align-items:center; gap:10px; }
.cart-row-total { font-size:15px; font-weight:700; }
.cart-del { background:none; border:none; color:var(--muted); font-size:17px; cursor:pointer; }
.cart-pay-btn {
  width:100%; padding:17px; background:var(--accent); border:none;
  border-radius:14px; color:#fff; font-size:18px; font-weight:700;
  cursor:pointer; margin:12px 0 6px; font-family:'Noto Sans KR',sans-serif;
}
.cart-more-btn {
  width:100%; padding:13px; background:transparent; border:2px solid var(--border);
  border-radius:14px; color:var(--muted); font-size:15px; font-weight:600;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; margin-bottom:8px;
}

/* ════════════════════════════
   PAGE 4: 결제 확인
════════════════════════════ */
#pg-pay { background:var(--bg); }
.pay-header { padding:52px 20px 20px; flex-shrink:0; }
.pay-title { font-size:24px; font-weight:900; margin-bottom:4px; }
.pay-sub { font-size:14px; color:var(--muted); }
.pay-body { flex:1; overflow-y:auto; padding:0 20px 100px; }
.pay-section { background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:18px; margin-bottom:14px; }
.pay-sec-title { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
.pay-wallet-row { display:flex; align-items:center; gap:10px; }
.pay-wallet-icon { font-size:24px; }
.pay-wallet-addr { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
.pay-item-row { display:flex; justify-content:space-between; margin-bottom:10px; font-size:15px; }
.pay-item-row:last-child { margin-bottom:0; }
.pay-item-name { color:var(--muted); }
.pay-item-val { font-weight:700; }
.pay-divider { height:1px; background:var(--border); margin:12px 0; }
.pay-total-row { display:flex; justify-content:space-between; align-items:center; }
.pay-total-label { font-size:15px; color:var(--muted); }
.pay-total-amount { font-size:28px; font-weight:900; }
.pay-reward-row { display:flex; justify-content:space-between; margin-top:8px; font-size:14px; }
.pay-reward-val { color:var(--accent); font-weight:700; }
.pay-footer { position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px; padding:16px 20px 28px; background:var(--surface);
  border-top:2px solid var(--border); }
.pay-confirm-btn {
  width:100%; padding:18px; background:var(--accent); border:none;
  border-radius:14px; color:#fff; font-size:18px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif;
}
.pay-confirm-btn:disabled { opacity:.5; cursor:default; }
.pay-cancel { display:block; text-align:center; margin-top:12px;
  color:var(--muted); font-size:15px; cursor:pointer; }

/* ════════════════════════════
   PAGE 5: 결제 완료
════════════════════════════ */
#pg-done {
  background:var(--bg); align-items:center;
  justify-content:center; padding:40px 24px; text-align:center;
}
.done-icon { font-size:64px; margin-bottom:20px; }
.done-title { font-size:30px; font-weight:900; margin-bottom:6px; }
.done-order { font-size:14px; color:var(--muted); margin-bottom:32px; }
.done-reward-box { background:var(--surface); border:2px solid var(--border); border-radius:18px;
  padding:24px 32px; width:100%; max-width:320px; margin-bottom:20px; }
.done-reward-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.done-reward-val { font-size:48px; font-weight:900; color:var(--gold); }
.done-tx { font-family:monospace; font-size:12px; color:var(--muted); margin-bottom:32px; }
.done-back-btn { padding:15px 40px; background:var(--surface); border:2px solid var(--border);
  border-radius:30px; color:var(--text); font-size:16px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
</style>
</head>
<body>

<!-- ══════════════════════════
     PAGE 1: 지갑 연결
══════════════════════════ -->
<div class="page on" id="pg-wallet">
  <div class="logo">Wiz<span>Pay</span></div>
  <div class="tagline">더 편한 글로벌 올인원 페이</div>

    <div class="err-box" id="errBox"></div>
    <div class="loading-box" id="loadBox">연결 중...</div>
    <button class="w-btn primary" onclick="connectMM()">
      <span class="w-btn-icon">🦊</span>
      <div>
        <div class="w-btn-name">MetaMask</div>
        <div class="w-btn-desc">브라우저 익스텐션 / 모바일 앱</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <button class="w-btn" onclick="connectTW()">
      <span class="w-btn-icon">🛡️</span>
      <div>
        <div class="w-btn-name">Trust Wallet</div>
        <div class="w-btn-desc">모바일 앱으로 연결</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <button class="w-btn" onclick="connectWC()">

      <div>
        <div class="w-btn-name">WalletConnect</div>
        <div class="w-btn-desc">300+ 지갑 QR 연결</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <button class="guest-btn" onclick="goStores(null)">지갑 없이 둘러보기</button>

  </div>
</div>

<!-- ══════════════════════════
     PAGE 2: 매장 목록
══════════════════════════ -->
<div class="page" id="pg-stores">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-title">주변 매장</div>
      <div class="top-sub">WizChain 결제 가능 매장</div>
    </div>

<!-- ══════════════════════════
     PAGE 3: 메뉴 목록
══════════════════════════ -->
<div class="page" id="pg-menu">
  <div class="menu-header">
    <button class="back-btn" onclick="goPage('pg-stores')">← 매장 목록</button>
    <div class="store-hero">
      <div class="hero-emoji" id="heroEmoji">🏪</div>
      <div>
        <div class="hero-name" id="heroName">매장명</div>

      <div class="cart-inner" id="cartInner"></div>

<!-- ══════════════════════════
     PAGE 4: 결제 확인
══════════════════════════ -->
<div class="page" id="pg-pay">
  <div class="pay-header">
    <button class="back-btn" onclick="goPage('pg-menu')" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;margin-bottom:14px;font-family:'Noto Sans KR',sans-serif;padding:0;">← 메뉴로</button>

<!-- ══════════════════════════
     PAGE 5: 결제 완료
══════════════════════════ -->
<div class="page" id="pg-done">
  <div class="done-icon">🎉</div>
  <div class="done-title">결제 완료!</div>
  <div class="done-order" id="doneOrder">#0000</div>
  <div class="done-reward-box">
    <div class="done-reward-label">OZ 토큰 적립</div>
    <div class="done-reward-val" id="doneReward">+0</div>
  </div>
  <div class="done-tx" id="doneTx">Tx: 0x...</div>
  <button class="done-back-btn" onclick="goPage('pg-stores')">← 매장 목록</button>
</div>

<script>
/* ── API 설정 ── */
const API = 'https://pos-api.wizclass.net';

/* ── API 호출 헬퍼 ── */
async function api(method, path, body) {
  try {
    const res = await fetch(API + path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
      signal: AbortSignal.timeout(5000)
    });
    return await res.json();
  } catch(e) {
    console.warn('API 오류:', e.message);
    return null;
  }
}

/* ── 샘플 데이터 (서버 없을 때 폴백) ── */
const STORES = [
  {

/* ── 상태 ── */
let walletAddr = '';
let currentStore = null;
let cart = {}; // {menuId: qty}
let cartOpen = false;
let currentCat = 'all';

/* ── 페이지 전환 ── */
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

/* ── 에러/로딩 ── */
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('errBox').style.display = 'none'; }
function showLoad(v) { document.getElementById('loadBox').style.display = v ? 'block' : 'none'; }

/* ── ethereum 감지 (3초 대기) ── */
function detectEthereum() {
  return new Promise(resolve => {
    if (window.ethereum) return resolve(window.ethereum);
    if (window.web3?.currentProvider) return resolve(window.web3.currentProvider);
    let n = 0;
    const t = setInterval(() => {
      if (window.ethereum) { clearInterval(t); resolve(window.ethereum); }
      else if (++n > 30) { clearInterval(t); resolve(null); }
    }, 100);
  });
}

/* ── 지갑 연결 공통 ── */
async function connectWallet(provider) {
  hideErr(); showLoad(true);
  try {
    if (typeof ethers === 'undefined') throw new Error('ethers 라이브러리 로드 실패. 새로고침하세요.');
    const bp = new ethers.BrowserProvider(provider);
    await bp.send('eth_requestAccounts', []);
    const signer = await bp.getSigner();
    walletAddr = await signer.getAddress();

    // WizChain 전환 (거부해도 계속)
    try {
      await provider.request({ method:'wallet_switchEthereumChain', params:[{chainId:'0x27F3'}] });
    } catch(e) {
      if (e.code === 4902 || e.code === -32603) {
        try {
          await provider.request({ method:'wallet_addEthereumChain', params:[{
            chainId:'0x27F3', chainName:'WizChain',
            nativeCurrency:{name:'WCN',symbol:'WCN',decimals:18},
            rpcUrls:['https://rpc.wizclass.net']
          }]});
        } catch(_) {}
      }
    }
    localStorage.setItem('wizpay_addr', walletAddr);
    goStores(walletAddr);
  } catch(e) {
    if (e.code === 4001) showErr('연결을 취소했습니다.');
    else showErr('연결 실패: ' + (e.message || String(e)));
  }
  showLoad(false);
}

/* ── MetaMask 연결 ── */
async function connectMM() {
  hideErr();
  const p = await detectEthereum();
  if (!p) {
    // 삼성 브라우저 등 → MetaMask 딥링크
    const host = location.host + location.pathname;
    window.location.href = 'https://metamask.app.link/dapp/' + host;
    return;
  }
  await connectWallet(p);
}

/* ── WalletConnect 연결 ── */
async function connectWC() {
  hideErr();
  const p = await detectEthereum();
  if (!p) {
    const host = location.host + location.pathname;
    window.location.href = 'https://metamask.app.link/dapp/' + host;
    return;
  }
  await connectWallet(p);
}

/* ── Trust Wallet 연결 ── */
async function connectTW() {
  hideErr();
  const p = await detectEthereum();
  if (!p) {
    window.location.href = 'https://link.trustwallet.com/open_url?coin_id=60&url=' + encodeURIComponent(location.href);
    return;
  }
  await connectWallet(p);
}

/* ── 매장 목록 ── */
async function goStores(addr) {
  if (addr) {
    document.getElementById('addrPill').style.display = 'flex';
    document.getElementById('addrShort').textContent = addr.slice(0,6)+'...'+addr.slice(-4);
  }
  goPage('pg-stores');
  await loadStores();
}

async function loadStores() {
  const list = document.getElementById('storeList');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">매장 불러오는 중...</div>';
  const data = await api('GET', '/api/stores');
  if (data && data.stores && data.stores.length) {
    // 서버 데이터 형식을 앱 형식으로 변환
    const serverStores = data.stores.map(s => ({
      id: String(s.id),
      name: s.name,
      cat: s.cat,
      emoji: s.emoji || '🏪',
      menus: [] // 메뉴는 상세에서 따로 로드
    }));
    renderStoreList(list, serverStores);
  } else {
    // 폴백: 샘플 데이터
    renderStoreList(list, STORES);
  }
}

let loadedStores = []; // 로드된 매장 목록 전역 저장

function renderStoreList(list, stores) {
  loadedStores = stores; // 전역 저장 (openStore에서 참조)
  if (!stores.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">주변에 등록된 매장이 없습니다</div>';
    return;
  }
  list.innerHTML = stores.map(s => `
    <div class="store-card" onclick="openStore('${s.id}')">
      <div class="sc-body">
        <div class="sc-emoji">${s.emoji}</div>
        <div class="sc-info">
          <div class="sc-name">${s.name}</div>
          <div class="sc-cat">${s.cat}</div>
          <div class="sc-tags">
            <span class="sc-tag">WizChain 결제</span>
            <span class="sc-tag">OZ 적립</span>
          </div>
        </div>
      </div>
      <div class="sc-footer">
        <div class="sc-reward">OZ 토큰 <strong>적립</strong></div>
        <div class="sc-go">메뉴 보기 →</div>
      </div>
    </div>
  `).join('');
}

function showAddr() {
  if (walletAddr) alert('연결된 지갑\n' + walletAddr);
}

/* ── 매장 상세 / 메뉴 ── */
async function openStore(id) {
  // STORES 샘플 또는 서버에서 로드된 스토어 찾기
  currentStore = loadedStores.find(s => s.id === id) || STORES.find(s => s.id === id) || { id, name:'', cat:'', emoji:'🏪', menus:[] };
  cart = {};
  currentCat = 'all';
  document.getElementById('heroEmoji').textContent = currentStore.emoji;
  document.getElementById('heroName').textContent = currentStore.name;
  document.getElementById('heroCat').textContent = currentStore.cat;
  goPage('pg-menu');
  renderMenus(); // 일단 빈 상태로 표시

  // 서버에서 매장+메뉴 상세 로드
  const data = await api('GET', '/api/stores/' + id);
  if (data && data.store) {
    const s = data.store;
    currentStore = {
      id: String(s.id),
      name: s.name,
      cat: s.cat,
      emoji: s.emoji || '🏪',
      menus: (s.menus || []).map(m => ({
        id: m.id,
        name: m.name,
        cat: m.cat,
        emoji: m.emoji || '🍽',
        price: m.price,
        reward: parseFloat(m.reward) || 1,
        desc: m.description || '',
        soldout: !!m.soldout
      }))
    };
    document.getElementById('heroEmoji').textContent = currentStore.emoji;
    document.getElementById('heroName').textContent = currentStore.name;
    document.getElementById('heroCat').textContent = currentStore.cat;
  }
  renderCatBar();
  renderMenus();
  updateCartBar();
}

function renderCatBar() {
  const cats = ['all', ...new Set(currentStore.menus.map(m => m.cat))];
  document.getElementById('catBar').innerHTML = cats.map(c =>
    `<button class="cat-btn${c===currentCat?' on':''}" onclick="selCat('${c}',this)">${c==='all'?'전체':c}</button>`
  ).join('');
}

function selCat(c, el) {
  currentCat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderMenus();
}

function renderMenus() {
  const menus = currentCat === 'all' ? currentStore.menus : currentStore.menus.filter(m => m.cat === currentCat);
  document.getElementById('menuList').innerHTML = menus.map(m => {
    const qty = cart[m.id] || 0;
    const qtyCtrl = m.soldout
      ? `<span class="soldout-badge">품절</span>`
      : `<div class="qty-wrap">
          ${qty > 0 ? `<button class="qty-btn" onclick="chgQty(${m.id},-1,event)">−</button><span class="qty-num">${qty}</span>` : `<span class="qty-num" style="min-width:0"></span>`}
          <button class="qty-add" onclick="chgQty(${m.id},1,event)">+</button>
        </div>`;
    return `
      <div class="menu-row${m.soldout?' soldout':''}">
        <div class="menu-emoji">${m.emoji}</div>
        <div class="menu-info">
          <div class="menu-name">${m.name}</div>
          <div class="menu-desc">${m.desc}</div>
          <div>
            <span class="menu-price">₩${m.price.toLocaleString()}</span>
            <span class="menu-rw">${m.reward}x OZ</span>
          </div>
        </div>
        ${qtyCtrl}
      </div>`;
  }).join('');
}

function chgQty(id, d, e) {
  e.stopPropagation();
  const m = currentStore.menus.find(x => x.id === id);
  if (!m || m.soldout) return;
  cart[id] = (cart[id] || 0) + d;
  if (cart[id] <= 0) delete cart[id];
  renderMenus();
  updateCartBar();
}

/* ── 장바구니 ── */
function cartItems() { return Object.entries(cart).map(([id,qty]) => ({m: currentStore.menus.find(x=>x.id==id), qty})).filter(x=>x.m); }
function cartTotal() { return cartItems().reduce((s,{m,qty}) => s + m.price*qty, 0); }
function cartCount() { return cartItems().reduce((s,{qty}) => s+qty, 0); }
function cartOZ() { return cartItems().reduce((s,{m,qty}) => s + m.price*qty/100*m.reward, 0); }

function updateCartBar() {
  document.getElementById('cartCnt').textContent = cartCount();
  document.getElementById('cartTotal').textContent = '₩' + cartTotal().toLocaleString();
}

function toggleCart() {
  cartOpen = !cartOpen;
  document.getElementById('cartDetail').classList.toggle('open', cartOpen);
  document.getElementById('cartArrow').classList.toggle('up', cartOpen);
  if (cartOpen) renderCartDetail();
}

function renderCartDetail() {
  const items = cartItems();
  if (!items.length) {
    document.getElementById('cartInner').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">장바구니가 비어있어요</div>';
    return;
  }
  document.getElementById('cartInner').innerHTML =
    items.map(({m,qty}) => `
      <div class="cart-row">
        <div class="cart-row-l">
          <span class="cart-row-em">${m.emoji}</span>
          <div>
            <div class="cart-row-name">${m.name} ×${qty}</div>
            <div class="cart-row-price">₩${m.price.toLocaleString()}</div>
          </div>
        </div>
        <div class="cart-row-r">
          <span class="cart-row-total">₩${(m.price*qty).toLocaleString()}</span>
          <button class="cart-del" onclick="chgQty(${m.id},-${qty},event);renderCartDetail()">✕</button>
        </div>
      </div>
    `).join('') +
    `<button class="cart-pay-btn" onclick="openPay()">결제하기 ₩${cartTotal().toLocaleString()}</button>
     <button class="cart-more-btn" onclick="toggleCart()">계속 담기</button>`;
}

/* ── 결제 화면 ── */
function openPay() {
  if (!cartCount()) return;
  document.getElementById('payStoreName').textContent = currentStore.name;
  document.getElementById('payWalletAddr').textContent = walletAddr
    ? walletAddr.slice(0,6)+'...'+walletAddr.slice(-4)
    : '지갑 미연결 (데모)';
  document.getElementById('payItems').innerHTML = cartItems().map(({m,qty}) =>
    `<div class="pay-item-row">
       <span class="pay-item-name">${m.emoji} ${m.name} ×${qty}</span>
       <span class="pay-item-val">₩${(m.price*qty).toLocaleString()}</span>
     </div>`
  ).join('');
  document.getElementById('payTotal').textContent = '₩' + cartTotal().toLocaleString();
  document.getElementById('payReward').textContent = '+' + cartOZ().toFixed(1) + ' OZ';
  goPage('pg-pay');
}

async function execPay() {
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = '처리 중...';
  try {
    const items = cartItems().map(({m, qty}) => ({
      name: m.name, emoji: m.emoji, price: m.price, qty
    }));
    const total = cartTotal();
    const oz = cartOZ();

    // 서버에 주문 생성
    const data = await api('POST', '/api/orders', {
      store_id: currentStore.id,
      customer_wallet: walletAddr || null,
      items,
      total_wusd: total,
      total_oz: oz,
      tx_hash: null
    });

    const orderNo = (data && data.order) ? data.order.order_no : Math.random().toString(16).slice(2,10).toUpperCase();
    document.getElementById('doneOrder').textContent = '주문번호 #' + orderNo;
    document.getElementById('doneReward').textContent = '+' + oz.toFixed(1);
    document.getElementById('doneTx').textContent = data?.order?.id ? 'Order ID: ' + data.order.id : '데모 주문';
    cart = {};
    updateCartBar();
    goPage('pg-done');
  } catch(e) {
    alert('주문 실패: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '결제하기';
}

/* ── 초기화 ── */
window.addEventListener('DOMContentLoaded', function() {
  // 이전에 연결된 지갑 자동 감지
  const saved = localStorage.getItem('wizpay_addr');
  if (saved && window.ethereum) {
    window.ethereum.request({method:'eth_accounts'}).then(accounts => {
      if (accounts.length) {
        walletAddr = accounts[0];
        goStores(walletAddr);
      }
    }).catch(() => {});
  }
});
</script>
